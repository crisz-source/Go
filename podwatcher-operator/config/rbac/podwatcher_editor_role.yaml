# This rule is not used by the project podwatcher-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the monitoring.ck.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: podwatcher-operator
    app.kubernetes.io/managed-by: kustomize
  name: podwatcher-editor-role
rules:
- apiGroups:
  - monitoring.ck.io
  resources:
  - podwatchers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.ck.io
  resources:
  - podwatchers/status
  verbs:
  - get
